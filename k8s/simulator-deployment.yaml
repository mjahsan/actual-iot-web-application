apiVersion: apps/v1
kind: Deployment

metadata:
  name: simulator
  namespace: landfill

spec:
  replicas: 1

  selector:
    matchLabels:
      app: simulator

  template:
    metadata:
      labels:
        app: simulator

    spec:
      containers:
      - name: simulator

        image: 394489192653.dkr.ecr.us-east-1.amazonaws.com/landfill-simulator:latest

        envFrom:
        - secretRef:
            name: postgres-secret