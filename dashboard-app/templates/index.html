<!DOCTYPE html>
<html>
<head>
    <title>Landfill Sector Operational Dashboard</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; background-color: #f4f6f9; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; background: white; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #ddd; }
        th { background-color: #2c3e50; color: white; }
        tr:hover { background-color: #f1f1f1; }
    </style>
    <meta http-equiv="refresh" content="5">
</head>
<body>
    <h2>Landfill Operations & Compliance Live Monitor (Mock Platform)</h2>
    <table>
        <tr>
            <th>Source / Sensor ID</th>
            <th>Methane Concentration (%)</th>
            <th>Weighbridge Mass (kg)</th>
            <th>Ingestion Timestamp</th>
        </tr>
        {% for row in records %}
        <tr>
            <td>{{ row[0] }}</td>
            <td>{{ row[1] }}</td>
            <td>{{ row[2] }}</td>
            <td>{{ row[3] }}</td>
        </tr>
        {% endfor %}
    </table>
</body>
</html>
